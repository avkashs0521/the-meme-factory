
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Meme Factory</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-text">The Meme <span class="logo-accent">Factory</span></span>
      </div>
      <p class="tagline">Browse the internet's most beloved meme templates</p>
    </div>
  </header>
 

  <main class="main">
 

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p class="loader-text">Loading memes...</p>
    </div>
 

    <div class="error-box" id="errorBox">
      <p id="errorMsg">Something went wrong. Please try again.</p>
    </div>
 

    <div class="meme-grid" id="memeGrid"></div>
 
  </main>
 
 
  <script src="script.js"></script>
</body>
</html>
